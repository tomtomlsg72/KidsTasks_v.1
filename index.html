<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LSG Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LSG Tasks">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icon-180.jpeg">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="screen">

  <!-- TOP BAR 
  <header class="topbar">
    <div class="topbar-logo">⚡ <span>LSG Dashboard</span></div>
    <div style="text-align:right">
      <div class="clock" id="clock">--:--</div>
      <div class="date-label" id="dateLabel">…</div>
    </div>
  </header>-->

  <!-- AVATARS -->
  <div class="avatar-bar">
    <div class="avatar-card jade" data-child="jade" onclick="selectChild('jade')">
        <div class="avatar-ring">
          <div class="avatar-inner">
            <img src="images/jade.png" alt="jade">
          </div>
        </div>
        <div class="avatar-badge" id="badge-jade"></div>
        <div class="avatar-name">Jade</div>
      </div>
      <div class="avatar-card alya" data-child="alya" onclick="selectChild('alya')">
        <div class="avatar-ring">
          <div class="avatar-inner">
            <img src="images/alya.png" alt="alya">
          </div>
        </div>
        <div class="avatar-badge" id="badge-alya"></div>
        <div class="avatar-name">Alya</div>
      </div>
    <div class="avatar-card eden" data-child="eden" onclick="selectChild('eden')">
        <div class="avatar-ring">
          <div class="avatar-inner">
            <img src="images/eden.png" alt="eden">
          </div>
        </div>
        <div class="avatar-badge" id="badge-eden"></div>
        <div class="avatar-name">Eden</div>
      </div>
  </div>

  <div class="section-divider"></div>

  <main class="main" id="mainContent">
    <div class="welcome-screen">
      <div class="welcome-emoji">👋</div>
      <div class="welcome-title">Bonjour ! Qui es-tu ?</div>
      <div class="welcome-sub">Clique sur ton avatar</div>
    </div>
  </main>

</div>

<script src="app.js" defer></script>
</body>
</html>
