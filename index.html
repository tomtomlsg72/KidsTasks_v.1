    const colors = { jade: '#00e5a0', alya: '#7b61ff', eden: '#ff6eb4', mady: '#ffaa33' };
    const glows = { jade: 'rgba(0,229,160,0.25)', alya: 'rgba(123,97,255,0.25)', eden: 'rgba(255,110,180,0.25)', mady: 'rgba(255,170,51,0.25)' };

    const dayLabels = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
    const behavTypes = ['violence', 'respect', 'betises'];
    const behavLabels = { violence: 'Violence', respect: 'Respect', betises: 'Bêtises' };

    let SECRET_CODE = '1234';

    let state = {
      active: null,
      done: { jade: new Set(), alya: new Set(), eden: new Set(), mady: new Set() },
      unlocked: false // admin mode for behavior removal
    };

    // ===== DAY LOG (localStorage) =====
    let dayLog = {};

    function loadDayLog() {
      try {
        const raw = localStorage.getItem('lsg_daylog');
        if (raw) dayLog = JSON.parse(raw);
      } catch (e) { dayLog = {}; }
    }

    function saveDayLog() {
      localStorage.setItem('lsg_daylog', JSON.stringify(dayLog));
    }

    function getTodayKey() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getTodayData(child) {
      const key = getTodayKey();
      if (!dayLog[key]) dayLog[key] = {};
      if (!dayLog[key][child]) {
        dayLog[key][child] = { allDone: false, behaviors: { violence: 0, respect: 0, betises: 0 } };
      }
      return dayLog[key][child];
    }

    function getDayData(dateKey, child) {
      if (!dayLog[dateKey]) return null;
      return dayLog[dateKey][child] || null;
    }

    function setAllDone(child) {
      const data = getTodayData(child);
      data.allDone = true;
      saveDayLog();
    }

    // ===== WEEKLY LOG (localStorage) =====
    let weeklyLog = {};

    function getWeekKey() {
      const d = new Date();
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const monday = new Date(d.setDate(diff));
      const y = monday.getFullYear();
      const m = String(monday.getMonth() + 1).padStart(2, '0');
      const dd = String(monday.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + dd;
    }

    function getWeekData(child) {
      const key = getWeekKey();
      if (!weeklyLog[key]) weeklyLog[key] = {};
      if (!weeklyLog[key][child]) weeklyLog[key][child] = { done: [] };
      return weeklyLog[key][child];
    }

    function loadWeeklyLog() {
      try { const raw = localStorage.getItem('lsg_weeklylog'); if (raw) weeklyLog = JSON.parse(raw); } catch (e) { weeklyLog = {}; }
    }

    function saveWeeklyLog() {
      localStorage.setItem('lsg_weeklylog', JSON.stringify(weeklyLog));
    }

    function getTimeEarned(child) {
      const data = getTodayData(child);
      let earned = 0;
      if (data.allDone) {
        const total = data.behaviors.violence + data.behaviors.respect + data.behaviors.betises;
        earned += Math.max(0, 45 - total * 5);
      }
      const weekData = getWeekData(child);
      earned += weekData.done.length * 15;
      return earned;
    }

    function addBehavior(child, type) {
      const data = getTodayData(child);
      data.behaviors[type] = (data.behaviors[type] || 0) + 1;
      saveDayLog();
      renderHomePanel();
    }

    function removeBehavior(child, type) {
      const data = getTodayData(child);
      if (data.behaviors[type] > 0) {
        data.behaviors[type]--;
        saveDayLog();
        renderHomePanel();
      }
    }

    // ===== WEEK CALC =====
    function getWeekDays() {
      const now = new Date();
      const day = now.getDay();
      const diffToMonday = (day === 0 ? -6 : 1 - day);
      const monday = new Date(now);
      monday.setDate(now.getDate() + diffToMonday);

      const week = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const key = y + '-' + m + '-' + dd;
        const isToday = key === getTodayKey();
        week.push({ label: dayLabels[i], key: key, isToday: isToday });
      }
      return week;
    }

    // ===== CLOCK =====
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      const days = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
      const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
      document.getElementById('dateLabel').textContent =
        days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ===== RENDER HOME PANEL =====
    function renderHomePanel() {
      const panel = document.getElementById('homePanel');
      const week = getWeekDays();
      let html = '';

      children.forEach(child => {
        const todayData = getTodayData(child);
        const color = colors[child];
        const timeMsg = getTimeEarned(child);

        // Weekly day cells
        let daysHtml = '';
        week.forEach(w => {
          const dayData = getDayData(w.key, child);
          const done = dayData && dayData.allDone && !w.isToday;
          const classes = 'day-cell' + (w.isToday ? ' today' : '') + (done ? ' done' : '');
          daysHtml += '<div class="' + classes + '">' + w.label + '</div>';
        });

        // Behavior buttons
        let behHtml = '';
        behavTypes.forEach(type => {
          const count = todayData.behaviors[type] || 0;
          behHtml += '<button class="beh-btn" data-child="' + child + '" data-type="' + type + '" onclick="onBehaviorClick(\'' + child + '\',\'' + type + '\')">' +
            '<span class="beh-label">' + behavLabels[type] + '</span>' +
            '<span class="beh-count" id="beh-' + child + '-' + type + '">' + count + '</span>' +
            '</button>';
        });

        const earned = getTimeEarned(child);
        const msgHtml = earned > 0
          ? '<div class="time-msg">Tu as gagn\u00e9 <strong>' + earned + ' min</strong> pour demain !</div>'
          : '';

        html += '<div class="child-panel" data-child="' + child + '">' +
          '<div class="avatar-card ' + child + '" data-child="' + child + '" onclick="selectChild(\'' + child + '\')">' +
          '<div class="avatar-ring"><div class="avatar-inner"><img src="images/' + child + '.png" alt="' + child + '"></div>' +
          '<div class="avatar-badge" id="badge-' + child + '"></div></div>' +
          '<div class="avatar-name">' + (child.charAt(0).toUpperCase() + child.slice(1)) + '</div>' +
          '</div>' +
          '<div class="child-week">' + daysHtml + '</div>' +
          '<div class="child-behaviors">' + behHtml + '</div>' +
          msgHtml +
          '</div>';
      });

      // Admin lock
      const lockIcon = state.unlocked ? '🔓' : '🔒';
      html += '<div class="admin-bar"><button class="admin-btn" onclick="toggleAdmin()">' + lockIcon + '</button></div>';

      panel.innerHTML = html;
    }

    // ===== BEHAVIOR CLICK =====
    function onBehaviorClick(child, type) {
      if (state.unlocked) {
        removeBehavior(child, type);
      } else {
        addBehavior(child, type);
      }
    }

    // ===== ADMIN TOGGLE =====
    function toggleAdmin() {
      if (state.unlocked) {
        state.unlocked = false;
        document.querySelector('.screen').classList.remove('unlocked');
        renderHomePanel();
        if (state.active) renderTasks(state.active);
        return;
      }
      const code = prompt('Code secret :');
      if (code === SECRET_CODE) {
        state.unlocked = true;
        document.querySelector('.screen').classList.add('unlocked');
        renderHomePanel();
        if (state.active) renderTasks(state.active);
      } else {
        alert('Code incorrect');
      }
    }

    // ===== SELECT CHILD =====
    function selectChild(child) {
      state.active = child;

      document.documentElement.style.setProperty('--active-color', colors[child]);
      document.documentElement.style.setProperty('--active-glow', glows[child]);
      document.querySelector('.orb-1').style.background = colors[child];
      document.querySelector('.orb-2').style.background = colors[child];

      document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('active'));
      document.querySelector('.avatar-card.' + child).classList.add('active');

      renderTasks(child);
    }

    // ===== TASK CARD HELPERS =====
    function buildDailyCardHtml(child, task) {
      var isDone = state.done[child].has(task.id);
      var clickHandler;
      if (isDone && state.unlocked) {
        clickHandler = 'uncompleteTask(\'' + child + '\',\'' + task.id + '\')';
      } else if (!isDone) {
        clickHandler = 'completeTask(\'' + child + '\',\'' + task.id + '\')';
      } else {
        clickHandler = '';
      }
      return '<div class="task-card ' + child + '-card' + (isDone ? ' done' : '') + '" onclick="' + clickHandler + '">' +
        '<div class="task-icon-wrap">' + task.icon + '</div>' +
        '<div class="task-content">' +
        '<div class="task-title">' + task.title + '</div>' +
        '<div class="task-desc">' + task.desc + '</div>' +
        '</div>' +
        '<div class="task-action">\u2713</div>' +
        '</div>';
    }

    function buildWeeklyCardHtml(child, task) {
      var weekData = getWeekData(child);
      var isDone = weekData.done.indexOf(task.id) !== -1;
      var clickHandler;
      if (isDone && state.unlocked) {
        clickHandler = 'uncompleteWeeklyTask(\'' + child + '\',\'' + task.id + '\')';
      } else if (!isDone) {
        clickHandler = 'completeWeeklyTask(\'' + child + '\',\'' + task.id + '\')';
      } else {
        clickHandler = '';
      }
      return '<div class="task-card ' + child + '-card' + (isDone ? ' done' : '') + '" onclick="' + clickHandler + '">' +
        '<div class="task-icon-wrap">' + task.icon + '</div>' +
        '<div class="task-content">' +
        '<div class="task-title">' + task.title + '</div>' +
        '<div class="task-desc">' + task.desc + '</div>' +
        '</div>' +
        '<span class="task-time-badge">+15 min</span>' +
        '<div class="task-action">\u2713</div>' +
        '</div>';
    }

    // ===== RENDER TASKS =====
    function renderTasks(child) {
      const main = document.getElementById('mainContent');
      const daily = tasks[child];
      const weeklies = weeklyTasks[child];
      const totalDaily = daily.length;
      const doneCount = state.done[child].size;
      const allDailyDone = doneCount === totalDaily;

      const progress = Math.round((doneCount / totalDaily) * 100);
      const firstName = child.charAt(0).toUpperCase() + child.slice(1);
      const morning = daily.slice(0, 5);
      const afternoon = daily.slice(5);

      let html = '<button class="back-btn" onclick="goHome()"><span class="back-arrow">\u2190</span> Accueil</button>';

      if (allDailyDone) {
        html += '<div class="all-done-banner">' +
          '<span class="all-done-trophy-sm">\uD83C\uDFC6</span>' +
          ' Bravo ' + firstName + ' ! Toutes les t\u00e2ches du jour sont faites \u2728' +
          '</div>';
      }

      html += '<div class="tasks-header">' +
        '<div class="tasks-greeting">Salut <span class="name-colored ' + child + '">' + firstName + '</span> \uD83D\uDC4B</div>' +
        '<div class="progress-pill">' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
        '<div class="progress-label">' + doneCount + '/' + totalDaily + '</div>' +
        '</div>' +
        '</div>';

      // Morning section
      html += '<div class="task-section"><div class="task-section-header">\u2600\uFE0F Matin</div><div class="task-section-inner">';
      morning.forEach(function (t) { html += buildDailyCardHtml(child, t); });
      html += '</div></div>';

      // Afternoon section
      html += '<div class="task-section"><div class="task-section-header">\uD83C\uDF24\uFE0F Apr\u00e8s-midi</div><div class="task-section-inner">';
      afternoon.forEach(function (t) { html += buildDailyCardHtml(child, t); });
      html += '</div></div>';

      // Weekly section
      html += '<div class="task-section-weekly"><div class="task-section-header">\uD83D\uDCC5 1 fois par semaine</div><div class="task-section-inner">';
      weeklies.forEach(function (t) { html += buildWeeklyCardHtml(child, t); });
      html += '</div></div>';

      main.innerHTML = html;
      updateBadge(child);
    }

    // ===== COMPLETE / UNCOMPLETE TASK =====
    function completeTask(child, taskId) {
      if (state.done[child].has(taskId)) return;
      state.done[child].add(taskId);

      if (state.done[child].size === tasks[child].length) {
        setAllDone(child);
        renderHomePanel();
      }

      renderTasks(child);
      updateBadge(child);
    }

    function uncompleteTask(child, taskId) {
      if (!state.unlocked) return;
      if (!state.done[child].has(taskId)) return;
      state.done[child].delete(taskId);

      const data = getTodayData(child);
      data.allDone = false;
      saveDayLog();

      renderHomePanel();
      renderTasks(child);
      updateBadge(child);
    }

    function completeWeeklyTask(child, taskId) {
      var weekData = getWeekData(child);
      if (weekData.done.indexOf(taskId) !== -1) return;
      weekData.done.push(taskId);
      saveWeeklyLog();
      renderHomePanel();
      renderTasks(child);
    }

    function uncompleteWeeklyTask(child, taskId) {
      if (!state.unlocked) return;
      var weekData = getWeekData(child);
      var idx = weekData.done.indexOf(taskId);
      if (idx === -1) return;
      weekData.done.splice(idx, 1);
      saveWeeklyLog();
      renderHomePanel();
      renderTasks(child);
    }

    // ===== BADGE =====
    function updateBadge(child) {
      var remaining = tasks[child].length - state.done[child].size;
      var badge = document.getElementById('badge-' + child);
      if (remaining > 0) {
        badge.textContent = remaining;
        badge.classList.add('show');
      } else {
        badge.classList.remove('show');
      }
    }

    // ===== GO HOME =====
    function goHome() {
      state.active = null;

      document.documentElement.style.setProperty('--active-color', '#00e5a0');
      document.documentElement.style.setProperty('--active-glow', 'rgba(0,229,160,0.25)');
      document.querySelector('.orb-1').style.background = '';
      document.querySelector('.orb-2').style.background = '';

      document.querySelectorAll('.avatar-card').forEach(function (c) { c.classList.remove('active'); });

      document.getElementById('mainContent').innerHTML = '' +
        '<div class="welcome-screen">' +
        '<div class="welcome-emoji">\uD83D\uDC4B</div>' +
        '<div class="welcome-title">Bonjour ! Qui es-tu ?</div>' +
        '<div class="welcome-sub">Clique sur ton avatar pour voir tes t\u00e2ches du jour</div>' +
        '</div>';
    }

    // ===== INIT =====
    loadDayLog();
    loadWeeklyLog();
    renderHomePanel();
    children.forEach(function (c) { updateBadge(c); });

    // Reset daily state if day changed (on page load)
    // state.done is per session; dayLog persists in localStorage
  </script>
</body>

</html>
