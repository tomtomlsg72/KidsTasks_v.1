      ]
    };

    var weeklyTasks = {
      jade: [
        { id: 'j_w1', icon: '\uD83E\uDDFD', title: 'Vider le lave-vaisselle', desc: 'Vide le lave-vaisselle et range tout \u00e0 sa place' },
        { id: 'j_w2', icon: '\uD83E\uDDF9', title: 'Grand m\u00e9nage dans sa chambre', desc: "Passe l'aspirateur, d\u00e9poussi\u00e8re et range tout" },
        { id: 'j_w3', icon: '\uD83E\uDDFA', title: 'Changer les draps de mon lit', desc: 'Enl\u00e8ve les draps sales et mets des draps propres' },
      ],
      alya: [
        { id: 'a_w1', icon: '\uD83E\uDDFD', title: 'Vider le lave-vaisselle', desc: 'Vide le lave-vaisselle et range tout \u00e0 sa place' },
        { id: 'a_w2', icon: '\uD83E\uDDF9', title: 'Grand m\u00e9nage dans sa chambre', desc: "Passe l'aspirateur, d\u00e9poussi\u00e8re et range tout" },
        { id: 'a_w3', icon: '\uD83E\uDDFA', title: 'Changer les draps de mon lit', desc: 'Enl\u00e8ve les draps sales et mets des draps propres' },
      ],
      eden: [
        { id: 'e_w1', icon: '\uD83E\uDDFD', title: 'Vider le lave-vaisselle', desc: 'Vide le lave-vaisselle et range tout \u00e0 sa place' },
        { id: 'e_w2', icon: '\uD83E\uDDF9', title: 'Grand m\u00e9nage dans sa chambre', desc: "Passe l'aspirateur, d\u00e9poussi\u00e8re et range tout" },
        { id: 'e_w3', icon: '\uD83E\uDDFA', title: 'Changer les draps de mon lit', desc: 'Enl\u00e8ve les draps sales et mets des draps propres' },
      ],
      mady: [
        { id: 'm_w1', icon: '\uD83E\uDDFD', title: 'Vider le lave-vaisselle', desc: 'Vide le lave-vaisselle et range tout \u00e0 sa place' },
        { id: 'm_w2', icon: '\uD83E\uDDF9', title: 'Grand m\u00e9nage dans sa chambre', desc: "Passe l'aspirateur, d\u00e9poussi\u00e8re et range tout" },
        { id: 'm_w3', icon: '\uD83E\uDDFA', title: 'Changer les draps de mon lit', desc: 'Enl\u00e8ve les draps sales et mets des draps propres' },
      ]
    };

    var colors = { jade: '#00e5a0', alya: '#7b61ff', eden: '#ff6eb4', mady: '#ffaa33' };
    var glows = { jade: 'rgba(0,229,160,0.25)', alya: 'rgba(123,97,255,0.25)', eden: 'rgba(255,110,180,0.25)', mady: 'rgba(255,170,51,0.25)' };
    var children = ['jade', 'alya', 'eden', 'mady'];
    var dayLabels = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
    var behavTypes = ['violence', 'respect', 'betises'];
    var behavLabels = { violence: 'Violence', respect: 'Respect', betises: 'B\u00eatises' };

    var SECRET_CODE = '1234';

    if (!String.prototype.padStart) {
      String.prototype.padStart = function (len, pad) {
        var s = String(this);
        while (s.length < len) s = (pad || ' ') + s;
        return s;
      };
    }

    var state = {
      active: null,
      done: { jade: new Set(), alya: new Set(), eden: new Set(), mady: new Set() },
      unlocked: false
    };

    var dayLog = {};

    function loadDayLog() {
      try { var raw = localStorage.getItem('lsg_daylog'); if (raw) dayLog = JSON.parse(raw); } catch (e) { dayLog = {}; }
    }
    function saveDayLog() { localStorage.setItem('lsg_daylog', JSON.stringify(dayLog)); }

    function getTodayKey() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getTodayData(child) {
      var key = getTodayKey();
      if (!dayLog[key]) dayLog[key] = {};
      if (!dayLog[key][child]) dayLog[key][child] = { allDone: false, behaviors: { violence: 0, respect: 0, betises: 0 } };
      return dayLog[key][child];
    }

    function getDayData(dateKey, child) {
      if (!dayLog[dateKey]) return null;
      return dayLog[dateKey][child] || null;
    }

    function setAllDone(child) {
      var data = getTodayData(child);
      data.allDone = true;
      saveDayLog();
    }

    var weeklyLog = {};

    function getWeekKey() {
      var d = new Date(), day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var monday = new Date(d.setDate(diff));
      return monday.getFullYear() + '-' + String(monday.getMonth() + 1).padStart(2, '0') + '-' + String(monday.getDate()).padStart(2, '0');
    }

    function getWeekData(child) {
      var key = getWeekKey();
      if (!weeklyLog[key]) weeklyLog[key] = {};
      if (!weeklyLog[key][child]) weeklyLog[key][child] = { done: [] };
      return weeklyLog[key][child];
    }

    function loadWeeklyLog() { try { var raw = localStorage.getItem('lsg_weeklylog'); if (raw) weeklyLog = JSON.parse(raw); } catch (e) { weeklyLog = {}; } }
    function saveWeeklyLog() { localStorage.setItem('lsg_weeklylog', JSON.stringify(weeklyLog)); }

    function getTimeEarned(child) {
      var data = getTodayData(child), earned = 0;
      if (data.allDone) {
        var total = data.behaviors.violence + data.behaviors.respect + data.behaviors.betises;
        earned += Math.max(0, 45 - total * 5);
      }
      earned += getWeekData(child).done.length * 15;
      return earned;
    }

    function addBehavior(child, type) {
      var data = getTodayData(child);
      data.behaviors[type] = (data.behaviors[type] || 0) + 1;
      saveDayLog(); renderHomePanel();
    }

    function removeBehavior(child, type) {
      var data = getTodayData(child);
      if (data.behaviors[type] > 0) { data.behaviors[type]--; saveDayLog(); renderHomePanel(); }
    }

    function getWeekDays() {
      var now = new Date(), day = now.getDay(), diff = (day === 0 ? -6 : 1 - day);
      var monday = new Date(now); monday.setDate(now.getDate() + diff);
      var week = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(monday); d.setDate(monday.getDate() + i);
        var key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        week.push({ label: dayLabels[i], key: key, isToday: key === getTodayKey() });
      }
      return week;
    }

    function updateClock() {
      var now = new Date();
      document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      var days = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
      var months = ['Jan', 'F\u00e9v', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Ao\u00fb', 'Sep', 'Oct', 'Nov', 'D\u00e9c'];
      document.getElementById('dateLabel').textContent = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
    }
    updateClock();
    setInterval(updateClock, 1000);

    function renderHomePanel() {
      var panel = document.getElementById('homePanel'), week = getWeekDays(), html = '';
      children.forEach(function (child) {
        var todayData = getTodayData(child), color = colors[child], daysHtml = '', behHtml = '';
        week.forEach(function (w) {
          var dayData = getDayData(w.key, child), done = dayData && dayData.allDone && !w.isToday;
          daysHtml += '<div class="day-cell' + (w.isToday ? ' today' : '') + (done ? ' done' : '') + '">' + w.label + '</div>';
        });
        behavTypes.forEach(function (type) {
          var count = todayData.behaviors[type] || 0;
          behHtml += '<button class="beh-btn" data-child="' + child + '" data-type="' + type + '" onclick="onBehaviorClick(\'' + child + '\',\'' + type + '\')"><span class="beh-label">' + behavLabels[type] + '</span><span class="beh-count" id="beh-' + child + '-' + type + '">' + count + '</span></button>';
        });
        var earned = getTimeEarned(child), msgHtml = earned > 0 ? '<div class="time-msg">Tu as gagn\u00e9 <strong>' + earned + ' min</strong> pour demain !</div>' : '';
        html += '<div class="child-panel" data-child="' + child + '"><div class="avatar-card ' + child + '" data-child="' + child + '" onclick="selectChild(\'' + child + '\')"><div class="avatar-ring"><div class="avatar-inner"><img src="images/' + child + '.png" alt="' + child + '"></div><div class="avatar-badge" id="badge-' + child + '"></div></div><div class="avatar-name">' + (child.charAt(0).toUpperCase() + child.slice(1)) + '</div></div><div class="child-week">' + daysHtml + '</div><div class="child-behaviors">' + behHtml + '</div>' + msgHtml + '</div>';
      });
      html += '<div class="admin-bar"><button class="admin-btn" onclick="toggleAdmin()">' + (state.unlocked ? '\uD83D\uDD13' : '\uD83D\uDD12') + '</button></div>';
      panel.innerHTML = html;
    }

    function onBehaviorClick(child, type) {
      if (state.unlocked) removeBehavior(child, type); else addBehavior(child, type);
    }

    function toggleAdmin() {
      if (state.unlocked) {
        state.unlocked = false;
        document.querySelector('.screen').classList.remove('unlocked');
        renderHomePanel();
        if (state.active) renderTasks(state.active);
        return;
      }
      if (prompt('Code secret :') === SECRET_CODE) {
        state.unlocked = true;
        document.querySelector('.screen').classList.add('unlocked');
        renderHomePanel();
        if (state.active) renderTasks(state.active);
      } else { alert('Code incorrect'); }
    }

    function selectChild(child) {
      state.active = child;
      document.documentElement.style.setProperty('--active-color', colors[child]);
      document.documentElement.style.setProperty('--active-glow', glows[child]);
      document.querySelector('.orb-1').style.background = colors[child];
      document.querySelector('.orb-2').style.background = colors[child];
      [].forEach.call(document.querySelectorAll('.avatar-card'), function (c) { c.classList.remove('active'); });
      document.querySelector('.avatar-card.' + child).classList.add('active');
      renderTasks(child);
    }

    function buildDailyCardHtml(child, task) {
      var isDone = state.done[child].has(task.id), ch;
      if (isDone && state.unlocked) ch = 'uncompleteTask(\'' + child + '\',\'' + task.id + '\')';
      else if (!isDone) ch = 'completeTask(\'' + child + '\',\'' + task.id + '\')';
      else ch = '';
      return '<div class="task-card ' + child + '-card' + (isDone ? ' done' : '') + '" onclick="' + ch + '"><div class="task-icon-wrap">' + task.icon + '</div><div class="task-content"><div class="task-title">' + task.title + '</div><div class="task-desc">' + task.desc + '</div></div><div class="task-action">\u2713</div></div>';
    }

    function buildWeeklyCardHtml(child, task) {
      var weekData = getWeekData(child), isDone = weekData.done.indexOf(task.id) !== -1, ch;
      if (isDone && state.unlocked) ch = 'uncompleteWeeklyTask(\'' + child + '\',\'' + task.id + '\')';
      else if (!isDone) ch = 'completeWeeklyTask(\'' + child + '\',\'' + task.id + '\')';
      else ch = '';
      return '<div class="task-card ' + child + '-card' + (isDone ? ' done' : '') + '" onclick="' + ch + '"><div class="task-icon-wrap">' + task.icon + '</div><div class="task-content"><div class="task-title">' + task.title + '</div><div class="task-desc">' + task.desc + '</div></div><span class="task-time-badge">+15 min</span><div class="task-action">\u2713</div></div>';
    }

    function renderTasks(child) {
      var main = document.getElementById('mainContent'), daily = tasks[child], weeklies = weeklyTasks[child], total = daily.length, done = state.done[child].size, allDone = done === total;
      var prog = Math.round((done / total) * 100), name = child.charAt(0).toUpperCase() + child.slice(1), morning = daily.slice(0, 5), afternoon = daily.slice(5);
      var html = '<button class="back-btn" onclick="goHome()"><span class="back-arrow">\u2190</span> Accueil</button>';
      if (allDone) html += '<div class="all-done-banner"><span class="all-done-trophy-sm">\uD83C\uDFC6</span> Bravo ' + name + ' ! Toutes les t\u00e2ches du jour sont faites \u2728</div>';
      html += '<div class="tasks-header"><div class="tasks-greeting">Salut <span class="name-colored ' + child + '">' + name + '</span> \uD83D\uDC4B</div><div class="progress-pill"><div class="progress-track"><div class="progress-fill" style="width:' + prog + '%"></div></div><div class="progress-label">' + done + '/' + total + '</div></div></div>';
      html += '<div class="task-section"><div class="task-section-header">\u2600\uFE0F Matin</div><div class="task-section-inner">';
      morning.forEach(function (t) { html += buildDailyCardHtml(child, t); });
      html += '</div></div><div class="task-section"><div class="task-section-header">\uD83C\uDF24\uFE0F Apr\u00e8s-midi</div><div class="task-section-inner">';
      afternoon.forEach(function (t) { html += buildDailyCardHtml(child, t); });
      html += '</div></div><div class="task-section-weekly"><div class="task-section-header">\uD83D\uDCC5 1 fois par semaine</div><div class="task-section-inner">';
      weeklies.forEach(function (t) { html += buildWeeklyCardHtml(child, t); });
      html += '</div></div>';
      main.innerHTML = html;
      updateBadge(child);
    }

    function completeTask(child, taskId) {
      if (state.done[child].has(taskId)) return;
      state.done[child].add(taskId);
      if (state.done[child].size === tasks[child].length) { setAllDone(child); renderHomePanel(); }
      renderTasks(child); updateBadge(child);
    }

    function uncompleteTask(child, taskId) {
      if (!state.unlocked || !state.done[child].has(taskId)) return;
      state.done[child].delete(taskId);
      getTodayData(child).allDone = false; saveDayLog();
      renderHomePanel(); renderTasks(child); updateBadge(child);
    }

    function completeWeeklyTask(child, taskId) {
      var wd = getWeekData(child);
      if (wd.done.indexOf(taskId) !== -1) return;
      wd.done.push(taskId); saveWeeklyLog();
      renderHomePanel(); renderTasks(child);
    }

    function uncompleteWeeklyTask(child, taskId) {
      if (!state.unlocked) return;
      var wd = getWeekData(child), idx = wd.done.indexOf(taskId);
      if (idx === -1) return;
      wd.done.splice(idx, 1); saveWeeklyLog();
      renderHomePanel(); renderTasks(child);
    }

    function updateBadge(child) {
      var remaining = tasks[child].length - state.done[child].size, badge = document.getElementById('badge-' + child);
      if (remaining > 0) { badge.textContent = remaining; badge.classList.add('show'); } else { badge.classList.remove('show'); }
    }

    function goHome() {
      state.active = null;
      document.documentElement.style.setProperty('--active-color', '#00e5a0');
      document.documentElement.style.setProperty('--active-glow', 'rgba(0,229,160,0.25)');
      document.querySelector('.orb-1').style.background = '';
      document.querySelector('.orb-2').style.background = '';
      [].forEach.call(document.querySelectorAll('.avatar-card'), function (c) { c.classList.remove('active'); });
      document.getElementById('mainContent').innerHTML = '<div class="welcome-screen"><div class="welcome-emoji">\uD83D\uDC4B</div><div class="welcome-title">Bonjour ! Qui es-tu ?</div><div class="welcome-sub">Clique sur ton avatar pour voir tes t\u00e2ches du jour</div></div>';
    }

    loadDayLog();
    loadWeeklyLog();
    renderHomePanel();
    children.forEach(function (c) { updateBadge(c); });
  </script>
</body>

</html>
